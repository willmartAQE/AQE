<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQE - Performance Benchmark</title>
    <link rel="stylesheet" href="style.css">
    <!-- Includi la versione Light -->
    <script src="docs/dist/aqe-light.min.js"></script> 
</head>
<body>
    <h1>AQE Performance Benchmark</h1>
    <p>Comparing AQE Light (Main Thread) vs AQE Pro (Parallel Worker)</p>

    <div class="controls">
        <label for="nodeCount">Number of Nodes:</label>
        <input type="range" id="nodeCount" min="1000" max="50000" step="1000" value="20000">
        <span id="nodeCountValue">20000</span> Nodes
        
        <label for="selector">CSS Selector:</label>
        <input type="text" id="selector" value="div.test-node.active#node-12345">

        <button id="runBenchmarkBtn">Run Benchmark</button>
    </div>

    <div id="results">
        <h2>Results:</h2>
        <p>Click "Run Benchmark" to start.</p>
        <div id="chart"></div> <!-- Qui potresti inserire un grafico -->
    </div>

    
    <!-- Il tuo script per il benchmark -->
    <script src="docs/benchmark.js"></script> 
</body>
</html>
